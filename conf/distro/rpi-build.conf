require conf/distro/poky.conf

DISTRO = "rpi-build"

DISTRO_FEATURES:append = " opengl pam systemd"

###############################################################################
# base-files.bb: poky\meta\recipes-core\base-files
# Keep /var/log persistent on the rootfs (do not symlink to /var/volatile/log).
# VOLATILE_LOG_DIR is available before Yocto Project Scarthgap.
# If Yocto Project Styhead is used, FILESYSTEM_PERMS_TABLES is available.
VOLATILE_LOG_DIR = "no"

###############################################################################
# wifi settings
DISTRO_FEATURES:append = " wifi"

###############################################################################
# Set PID 1 init system to systemd
VIRTUAL-RUNTIME:init_manager = "systemd"
VIRTUAL-RUNTIME:initscripts = ""
INIT_MANAGER = "systemd"

###############################################################################
# raspberry pi config parameters
# meta-raspberrypi\recipes-bsp\bootfiles\rpi-config_git.bb
# meta-raspberrypi\recipes-bsp\bootfiles\rpi-cmdline.bb
ENABLE_UART = "1"
DISABLE_RPI_BOOT_LOGO = "1"
CMDLINE:append = " splash plymouth.ignore-serial-consoles console=tty1"

###############################################################################
# rpi-config.bbappend parameters
# meta-custom\recipes-bsp\rpi-config\rpi-config_git.bbappend
ENABLE_NVME = "1"
